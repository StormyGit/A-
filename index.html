<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>A* Husk</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body>

        <div 
            id="app"
            class="bg-black text-white w-screen h-screen font-bold">
            <div 
                id="myCanvas"
                class="h-11/12 p-4 items-center justify-center flex">
                <canvas id="canvas" width="500" height="500" class="bg-white"></canvas>
            </div>
            <div 
                class="h-1/12 p-4 flex">
                <div 
                    id="myBoard"
                    class="h-full w-2/5 flex items-center justify-center">
                </div>
                <div 
                    id="myControl"
                    class="h-full w-2/5 flex items-center justify-center">
                </div>
                <div class="justify-center items-center flex flex-col w-1/5">
                    <div class="flex">
                        <span class="text-sm mr-2">x: </span>
                        <input id="pos_x" class="w-full" readonly>
                    </div>
                    <div class="flex">
                        <span class="text-sm mr-2">y: </span>
                        <input id="pos_y" class="w-full" readonly>
                    </div>
                </div>
            </div>
        </div>

        <script src="index.js"></script>
    </body> 
</html>
